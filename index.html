<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gao Yifei</title>
  <style>
    :root { color-scheme: light; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #17201b;
      background: #f7faf8;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px;
    }
    main {
      width: min(720px, 100%);
    }
    .eyebrow {
      margin: 0 0 12px;
      color: #47715b;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    h1 {
      margin: 0;
      font-size: clamp(40px, 8vw, 76px);
      line-height: 0.98;
      letter-spacing: 0;
    }
    p {
      margin: 24px 0 0;
      max-width: 620px;
      color: #415248;
      font-size: 19px;
      line-height: 1.65;
    }
    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 32px;
    }
    a {
      color: #173f2a;
      text-decoration: none;
    }
    .button {
      border: 1px solid #b6c8bd;
      border-radius: 8px;
      padding: 10px 14px;
      background: #ffffff;
      font-weight: 650;
    }
    .button:hover { border-color: #47715b; }
  </style>
</head>
<body>
  <main>
    <p class="eyebrow">piglin.me</p>
    <h1>Gao Yifei</h1>
    <p>
      Biomedical Engineering student at Peking University. This site is freshly connected to GitHub Pages and ready to become a portfolio, lab notes, or whatever comes next.
    </p>
    <div class="links">
      <a class="button" href="https://github.com/gao-yi-fei">GitHub</a>
      <a class="button" href="mailto:859635704@qq.com">Email</a>
    </div>
  </main>
</body>
</html>
