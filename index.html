<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SCPPER-MC</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="/assets/scpper.css">
</head>
<body>
  <header>
    <div class="topline">
      <div>
        <h1>SCPPER-MC</h1>
        <p class="lead">SCP基金会 Minecraft 分部备份检索站。这里是基本状态页，完整检索请进入分页。</p>
        <div class="credit">created by piglin</div>
      </div>
      <div class="card" style="min-width:220px">
        <span class="card-label">当前北京时间</span>
        <span class="card-value" id="nowBeijing">--</span>
      </div>
    </div>
    <nav class="nav" id="nav" aria-label="站点导航"></nav>
  </header>
  <main>
    <ul class="stats" id="stats"></ul>
    <section class="panel" style="margin-bottom:14px">
      <div class="panel-head">
        <h2>当前竞赛</h2>
        <div class="small" id="contestHint">加载中...</div>
      </div>
      <div class="panel-section" id="contest"></div>
    </section>
    <section class="grid-3">
      <div class="panel">
        <div class="panel-head"><h2>最近发帖</h2><div class="small">与最近页一致</div></div>
        <div class="panel-section compact-list" id="recentPosts"></div>
      </div>
      <div class="panel">
        <div class="panel-head"><h2>最近页面</h2><div class="small">按创建时间</div></div>
        <div class="panel-section compact-list" id="recentPages"></div>
      </div>
      <div class="panel">
        <div class="panel-head"><h2>最近编辑</h2><div class="small">按编辑时间</div></div>
        <div class="panel-section compact-list" id="recentEdits"></div>
      </div>
    </section>
    <div class="actions" style="margin:14px 0 26px">
      <a href="/pages.html">进入页面索引</a>
      <a href="/users.html">进入用户索引</a>
      <a href="/forum.html">进入讨论区</a>
      <a href="/recent.html">查看完整最近动态</a>
    </div>
  </main>
  <script src="/assets/common.js"></script>
  <script>
    const C = window.SCPPER;
    const $ = (id) => document.getElementById(id);

    function pageLink(item) {
      const title = C.recentTitle(item);
      const href = item.url || item.page_url || item.thread_url || "#";
      return href === "#" ? C.escapeHtml(title) : `<a href="${C.escapeHtml(href)}" target="_blank" rel="noreferrer">${C.escapeHtml(title)}</a>`;
    }
    function renderStats(stats) {
      const k = stats.page_kind_counts || {};
      $("stats").innerHTML = [
        ["页面", stats.page_count], ["用户", stats.user_count], ["原创", k.original || 0], ["翻译", k.translation || 0],
        ["段落", k.fragment || 0], ["讨论串", stats.forum_thread_count], ["帖子", stats.forum_post_count],
        ["生成时间", stats.generated_at_beijing || C.formatBeijing(stats.generated_at)],
      ].map(([label, value]) => `<li><span>${label}</span>${typeof value === "number" ? C.fmt.format(value) : C.escapeHtml(value)}</li>`).join("");
    }
    function renderContest(contest) {
      if (!contest) {
        $("contestHint").textContent = "未识别到当前竞赛";
        $("contest").innerHTML = `<p class="small">没有找到带竞赛标签的中心页。</p>`;
        return;
      }
      const schedule = contest.schedule || {};
      const scheduleItems = [
        ["投稿开始", schedule.submission_start?.at_beijing],
        ["投稿截止", schedule.submission_end?.at_beijing],
        ["投票截止", schedule.voting_end?.at_beijing],
      ].filter(([, value]) => value);
      $("contestHint").textContent = `${contest.tag}${schedule.stage ? ` · ${schedule.stage}` : ""}${contest.entry_count != null ? ` · ${C.fmt.format(contest.entry_count)} 项` : ""}`;
      const top = (contest.ranking || []).slice(0, 8);
      $("contest").innerHTML = `
        <h3>${pageLink(contest.hub)}</h3>
        <p class="small">竞赛信息来自 SCP-MC 主页提示与竞赛中心页；排名按分数、upvote 比例、发布时间排序。</p>
        ${scheduleItems.length ? `<div class="tags">${scheduleItems.map(([label, value]) => `<span class="tag">${label} ${C.escapeHtml(value)}</span>`).join("")}</div>` : ""}
        ${top.length ? top.map((item, index) => {
          const author = item.history_author_name ? ` · 作者 ${C.escapeHtml(item.history_author_name)}` : "";
          return `<div class="activity activity-card" data-href="${C.escapeHtml(C.pageHref(item.page_name))}" role="link" tabindex="0"><strong>#${index + 1} ${pageLink(item)}</strong><span class="small">评分 ${C.ratingLabel(item.rating)} · +${C.fmt.format(item.vote_up || 0)} / -${C.fmt.format(item.vote_down || 0)} · 发布 ${C.escapeHtml(C.formatBeijing(item.created_at, item.created_at_beijing) || "n/a")}${author}</span></div>`;
        }).join("") : `<p class="small">暂未识别到参赛作品。</p>`}
      `;
    }
    function renderRecentList(id, items, tab) {
      const rows = (items || []).slice(0, 5);
      $(id).innerHTML = rows.length
        ? rows.map((item) => C.renderRecentItem(item, tab)).join("")
        : `<p class="small">暂无数据。</p>`;
    }
    async function init() {
      $("nav").innerHTML = C.renderNav("home");
      C.wireRefresh();
      C.tickBeijing("nowBeijing");
      const payload = await C.loadJson("data/home-index.json.gz");
      renderStats(payload.stats || {});
      renderContest(payload.current_contest);
      renderRecentList("recentPosts", payload.recent_posts, "posts");
      renderRecentList("recentPages", payload.recent_pages, "pages");
      renderRecentList("recentEdits", payload.recent_edits, "edits");
      C.wireRecentCards(document);
    }
    init().catch((err) => {
      $("contest").innerHTML = `<div class="empty">加载失败：${C.escapeHtml(err.message)}</div>`;
    });
  </script>
</body>
</html>
