name: Auto Update SCPPER-MC

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

concurrency:
  group: scpper-auto-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    steps:
      - name: Mark run start
        id: run_clock
        shell: bash
        run: echo "start=$(date -u +%s)" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.SCPPER_BOT_TOKEN || github.token }}

      - name: Sync latest main before deciding refresh
        run: |
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Check refresh window
        id: refresh_window
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "Manual dispatch; refreshing now."
            exit 0
          fi
          stamp="$(cat data/cloud-updated-at.txt 2>/dev/null || true)"
          if [ -z "$stamp" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "No previous cloud-updated-at.txt; refreshing now."
            exit 0
          fi
          last="$(date -u -d "$stamp" +%s 2>/dev/null || echo 0)"
          now="$(date -u +%s)"
          age="$((now - last))"
          echo "Last successful refresh was ${age}s ago."
          if [ "$age" -ge 720 ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-python@v5
        if: steps.refresh_window.outputs.run == 'true'
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: tools/requirements-wikidot-crawler.txt

      - uses: actions/cache@v4
        if: steps.refresh_window.outputs.run == 'true'
        with:
          path: .scpper-cache
          key: scpper-cache-${{ github.run_id }}
          restore-keys: |
            scpper-cache-

      - name: Install crawler dependencies
        if: steps.refresh_window.outputs.run == 'true'
        run: python -m pip install -r tools/requirements-wikidot-crawler.txt

      - name: Crawl, build, repair, and stage site
        if: steps.refresh_window.outputs.run == 'true'
        env:
          SCPPER_WORKERS: "32"
          SCPPER_FORUM_WORKERS: "24"
        run: python tools/cloud_update_scpper.py

      - name: Commit refreshed site
        if: steps.refresh_window.outputs.run == 'true'
        run: |
          git config user.name "piglin-site-bot"
          git config user.email "piglin-site-bot@users.noreply.github.com"
          find tools -type d -name __pycache__ -prune -exec rm -rf {} +
          git add -A index.html pages.html users.html forum.html recent.html sw.js assets data downloads tools .github
          if git diff --cached --quiet; then
            echo "No site changes."
          else
            git commit -m "Auto refresh SCPPER-MC site"
            git push
          fi

      - name: Confirm GitHub Pages deployment
        if: steps.refresh_window.outputs.run == 'true'
        env:
          GH_TOKEN: ${{ secrets.SCPPER_BOT_TOKEN }}
        shell: bash
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "SCPPER_BOT_TOKEN is missing; skipping Pages deployment confirmation."
            exit 0
          fi

          target="$(git rev-parse HEAD)"
          for attempt in 1 2 3 4; do
            if [ "$attempt" -eq 1 ]; then
              sleep 30
            else
              sleep 45
            fi

            latest="$(
              gh api "repos/$GITHUB_REPOSITORY/pages/builds/latest" \
                --jq '[.status, .commit, (.error.message // .message // "")] | @tsv' 2>/dev/null || true
            )"
            status="$(printf '%s' "$latest" | awk -F '\t' 'NR==1 { print $1 }')"
            commit="$(printf '%s' "$latest" | awk -F '\t' 'NR==1 { print $2 }')"
            message="$(printf '%s' "$latest" | awk -F '\t' 'NR==1 { print $3 }')"

            echo "Pages check ${attempt}: status=${status:-unknown} commit=${commit:-unknown} target=$target ${message:+message=$message}"
            if [ "$commit" = "$target" ] && [ "$status" = "built" ]; then
              echo "GitHub Pages confirmed built for $target."
              exit 0
            fi

            if [ "$commit" = "$target" ] && { [ "$status" = "errored" ] || [ "$status" = "failed" ]; }; then
              echo "Latest Pages build failed for $target; requesting rebuild."
              gh api -X POST "repos/$GITHUB_REPOSITORY/pages/builds" >/dev/null || true
              continue
            fi

            if [ "$attempt" -ge 2 ]; then
              echo "Requesting Pages build/rebuild for $target."
              gh api -X POST "repos/$GITHUB_REPOSITORY/pages/builds" >/dev/null || true
            fi
          done

          echo "Pages build was not confirmed in this run; the next dispatch will check again."

      - name: Queue next dispatch loop
        if: always() && github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.SCPPER_BOT_TOKEN }}
          RUN_START: ${{ steps.run_clock.outputs.start }}
        shell: bash
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "SCPPER_BOT_TOKEN is missing; cannot queue next dispatch."
            exit 0
          fi
          now="$(date -u +%s)"
          elapsed="$((now - RUN_START))"
          delay="$((900 - elapsed))"
          if [ "$delay" -lt 60 ]; then
            delay=60
          fi
          echo "Queueing next Auto Update SCPPER-MC dispatch in ${delay}s."
          sleep "$delay"
          gh workflow run scpper-auto-update.yml --repo "$GITHUB_REPOSITORY" --ref main || {
            echo "Failed to queue next dispatch; leaving current refresh successful."
            exit 0
          }
